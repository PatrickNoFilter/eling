name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short 2>&1 | tail -20

      - name: Report test count
        run: python -m pytest tests/ --collect-only -q 2>&1 | tail -1

  benchmark:
    name: benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run benchmark
        id: bench
        run: |
          python -m eling.scripts.benchmark --runs 5 --json > bench.json
          echo "### Benchmark Results (p95 ms)" >> $GITHUB_STEP_SUMMARY
          python -c "
          import json
          data = json.load(open('bench.json'))
          for r in data:
              op = r['operation']
              p95 = r['p95_ms']
              avg = r['avg_ms']
              print(f'- **{op}**: p95={p95:.2f}ms, avg={avg:.2f}ms')
          " >> $GITHUB_STEP_SUMMARY

      - name: Comment benchmark on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('bench.json', 'utf8'));
            let body = '## ⏱ Eling Benchmark\n\n| Operation | p50 (ms) | p95 (ms) | avg (ms) |\n|---|---|---|---|\n';
            for (const r of data) {
              body += `| ${r.operation} | ${r.p50_ms.toFixed(2)} | ${r.p95_ms.toFixed(2)} | ${r.avg_ms.toFixed(2)} |\n`;
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
