[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "eling"
version = "0.5.1"
description = "Unified second brain for AI agents — 5-tier memory, HRR reasoning, 14 MCP tools, Zettelkasten linking, memory evolution"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
keywords = ["memory", "mcp", "ai-agent", "second-brain", "hrr"]

authors = [
    {name = "PatrickNoFilter"},
]

classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    # numpy is optional — needed only for HRR.
    # Install via: pip install eling[hrr] or pip install eling[dev]
]

[project.optional-dependencies]
hrr = ["numpy>=1.24"]
embeddings = ["sentence-transformers>=3.0"]
all = ["eling[hrr,embeddings]"]
dev = [
    "eling[hrr]",
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[project.scripts]
eling-install-opencode = "eling.cli:_run_install_opencode_cli"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
eling = ["opencode_plugin/*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
